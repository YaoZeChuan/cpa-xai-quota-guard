name: build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Fetch CLIProxyAPI SDK source
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/router-for-me/CLIProxyAPI ./CLIProxyAPI-src
          printf '\nreplace github.com/router-for-me/CLIProxyAPI/v7 => ./CLIProxyAPI-src\n' >> go.mod
          go mod download || true
      - name: Test
        run: go test ./internal/xaiquota/ -count=1

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: .so
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: .so
            cc: aarch64-linux-gnu-gcc
            install_cc: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: .dylib
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: .dylib
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: .dll
          - os: windows-latest
            goos: windows
            goarch: arm64
            ext: .dll

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Install cross compiler (linux/arm64)
        if: matrix.install_cc != ''
        run: ${{ matrix.install_cc }}

      - name: Resolve package name
        id: package_meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            PACKAGE_TAG="${GITHUB_REF_NAME}"
          else
            PACKAGE_TAG="snapshot-${GITHUB_SHA::7}"
          fi
          ZIP_NAME="cpa-xai-quota-guard_${PACKAGE_TAG}_${{ matrix.goos }}_${{ matrix.goarch }}"
          echo "package_tag=${PACKAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Fetch CLIProxyAPI SDK source
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/router-for-me/CLIProxyAPI ./CLIProxyAPI-src
          printf '\nreplace github.com/router-for-me/CLIProxyAPI/v7 => ./CLIProxyAPI-src\n' >> go.mod
          go mod download 2>&1 | tee download.log || true

      - name: Build c-shared
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CC: ${{ matrix.cc }}
          ZIP_NAME: ${{ steps.package_meta.outputs.zip_name }}
        run: |
          set -euo pipefail
          mkdir -p bin dist
          OUT="bin/cpa-xai-quota-guard${{ matrix.ext }}"
          # Windows arm64 may lack CGO toolchain on runner; allow soft-fail for that matrix only
          set +e
          go build -buildmode=c-shared -trimpath -o "$OUT" . 2>&1 | tee build.log
          code=${PIPESTATUS[0]}
          set -e
          if [[ $code -ne 0 ]]; then
            if [[ "${{ matrix.goos }}" == "windows" && "${{ matrix.goarch }}" == "arm64" ]]; then
              echo "WARN: windows/arm64 build failed (toolchain); skipping artifact"
              exit 0
            fi
            exit $code
          fi
          ls -la bin
          # package zip for CPA plugin-store / manual install
          # CPA expects plugins/<goos>/<goarch>/<name>.so|dll|dylib
          STAGE="dist/stage/${{ matrix.goos }}/${{ matrix.goarch }}"
          mkdir -p "$STAGE"
          cp -f "$OUT" "$STAGE/cpa-xai-quota-guard${{ matrix.ext }}"
          (
            cd dist/stage
            if command -v zip >/dev/null 2>&1; then
              zip -r "../${ZIP_NAME}.zip" "${{ matrix.goos }}"
            else
              # Windows runners: use PowerShell Compress-Archive via bash fallback
              powershell.exe -NoProfile -Command "Compress-Archive -Path '${{ matrix.goos }}' -DestinationPath '../${ZIP_NAME}.zip' -Force" || true
            fi
          )
          ls -la dist || true

      - name: Upload library artifact
        uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/cpa-xai-quota-guard${{ matrix.ext }}
          if-no-files-found: warn
          retention-days: 30

      - name: Upload zip package
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ steps.package_meta.outputs.zip_name }}
          path: dist/${{ steps.package_meta.outputs.zip_name }}.zip
          if-no-files-found: warn
          retention-days: 30

  release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all zip artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: zip-*
          merge-multiple: true
      - name: List assets
        run: find release-assets -type f -print

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum *.zip > checksums.txt
          cat checksums.txt
      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.zip
            release-assets/checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: false
